version: "3.9"

# Lightweight stack — no Redis, no Surya, minimal RAM footprint
# Usage: docker compose -f docker-compose.lite.yml up -d

services:

  postgres:
    image: postgres:16-alpine
    container_name: compliance-postgres-lite
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       compliance_db
    ports: ["5432:5432"]
    volumes:
      - postgres_lite_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: compliance-backend-lite
    restart: unless-stopped
    environment:
      DATABASE_URL:   postgresql+asyncpg://postgres:password@postgres:5432/compliance_db
      REDIS_URL:      redis://localhost:6379   # will fail gracefully; status stored in DB only
      OCR_ENGINE:     tesseract
      SURYA_ENABLED:  "false"
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL:   gemini-1.5-flash
      R2_ACCOUNT_ID:        ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID:     ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME:       ${R2_BUCKET_NAME}
      R2_ENDPOINT_URL:      ${R2_ENDPOINT_URL}
      MAX_FILE_SIZE_MB: "20"
      MAX_PAGES:        "10"
      CORS_ORIGINS:     "http://localhost:3000,http://localhost:5173"
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: compliance-frontend-lite
    ports: ["3000:80"]
    depends_on: [backend]

volumes:
  postgres_lite_data:
